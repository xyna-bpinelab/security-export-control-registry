name: Ingest Entity Lists

on:
  schedule:
    # Runs at 12:00 UTC daily (after the US CSL's ~05:00 US-Eastern daily refresh)
    - cron: '0 12 * * *'
    # Runs at 12:30 UTC every Monday (JP's list only revises a few times a
    # year; this just re-checks the currently configured press release PDF)
    - cron: '30 12 * * 1'
    # Runs at 13:00 UTC every Monday (CN's lists revise irregularly too;
    # re-scans MOFCOM's regulatory-document index for new announcements)
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which ingest job(s) to run (use us/jp/cn to test one in isolation without racing the others on manifest.json)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - us
          - jp
          - cn

permissions:
  contents: write
  issues: write

jobs:
  ingest-us:
    # The three cron entries above all trigger this workflow, so without
    # this guard every job would run on every schedule.
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'us'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt

      - name: Ingest US Consolidated Screening List
        run: |
          python scripts/ingest/ingest_us_csl.py

      - name: Validate Entities
        run: |
          python schema/validate_entities.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/entities/us.json data/manifest.json data/entity_count_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh US Consolidated Screening List [skip ci]"
          # ingest-us/jp/cn share manifest.json and entity_count_history.json,
          # so a workflow_dispatch run (all three jobs at once) can race on
          # the push; retry with a rebase in between attempts.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest main and retrying..."
            git pull --rebase --autostash
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Ensure Label Exists
        if: hashFiles('scripts/crawler/update_summary.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "update-alert" \
            --description "Automated alert: regulatory source change detected" \
            --color "D93F0B" \
            --force

      - name: Create Issue if Update Detected
        if: hashFiles('scripts/crawler/update_summary.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "【自動検知】US Consolidated Screening List に変更がありました" \
            --body-file scripts/crawler/update_summary.txt \
            --label "update-alert"

  ingest-jp:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 12 * * 1') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'jp'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt

      - name: Ingest JP Foreign End-User List
        run: |
          python scripts/ingest/ingest_jp_end_user_list.py

      - name: Validate Entities
        run: |
          python schema/validate_entities.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/entities/jp.json data/manifest.json data/entity_count_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh JP Foreign End-User List [skip ci]"
          # ingest-us/jp/cn share manifest.json and entity_count_history.json,
          # so a workflow_dispatch run (all three jobs at once) can race on
          # the push; retry with a rebase in between attempts.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest main and retrying..."
            git pull --rebase --autostash
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Ensure Label Exists
        if: hashFiles('scripts/crawler/update_summary.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "update-alert" \
            --description "Automated alert: regulatory source change detected" \
            --color "D93F0B" \
            --force

      - name: Create Issue if Update Detected
        if: hashFiles('scripts/crawler/update_summary.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "【自動検知】JP 外国ユーザーリストに変更がありました" \
            --body-file scripts/crawler/update_summary.txt \
            --label "update-alert"

  ingest-cn:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'cn'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt

      - name: Ingest CN Entity Lists
        run: |
          python scripts/ingest/ingest_cn_lists.py

      - name: Validate Entities
        run: |
          python schema/validate_entities.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/entities/cn.json data/manifest.json data/entity_count_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh CN entity lists [skip ci]"
          # ingest-us/jp/cn share manifest.json and entity_count_history.json,
          # so a workflow_dispatch run (all three jobs at once) can race on
          # the push; retry with a rebase in between attempts.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest main and retrying..."
            git pull --rebase --autostash
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Ensure Label Exists
        if: hashFiles('scripts/crawler/update_summary.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "update-alert" \
            --description "Automated alert: regulatory source change detected" \
            --color "D93F0B" \
            --force

      - name: Create Issue if Update Detected
        if: hashFiles('scripts/crawler/update_summary.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "【自動検知】CN 企業リストに変更がありました" \
            --body-file scripts/crawler/update_summary.txt \
            --label "update-alert"
