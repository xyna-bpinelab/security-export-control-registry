name: Ingest Entity Lists

on:
  schedule:
    # Runs at 12:00 UTC daily (after the US CSL's ~05:00 US-Eastern daily refresh)
    - cron: '0 12 * * *'
    # Runs at 12:30 UTC every Monday (JP's list only revises a few times a
    # year; this just re-checks the currently configured press release PDF)
    - cron: '30 12 * * 1'
    # Runs at 13:00 UTC every Monday (CN's lists revise irregularly too;
    # re-scans MOFCOM's regulatory-document index for new announcements)
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest-us:
    # Both cron entries above trigger this workflow, so without this guard
    # every job would run on both schedules. Manual dispatch always runs both.
    if: github.event_name != 'schedule' || github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt

      - name: Ingest US Consolidated Screening List
        run: |
          python scripts/ingest/ingest_us_csl.py

      - name: Validate Entities
        run: |
          python schema/validate_entities.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/entities/us.json data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh US Consolidated Screening List [skip ci]"
            git push
          fi

  ingest-jp:
    if: github.event_name != 'schedule' || github.event.schedule == '30 12 * * 1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt

      - name: Ingest JP Foreign End-User List
        run: |
          python scripts/ingest/ingest_jp_end_user_list.py

      - name: Validate Entities
        run: |
          python schema/validate_entities.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase
          git add data/entities/jp.json data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh JP Foreign End-User List [skip ci]"
            git push
          fi

  ingest-cn:
    if: github.event_name != 'schedule' || github.event.schedule == '0 13 * * 1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt

      - name: Ingest CN Entity Lists
        run: |
          python scripts/ingest/ingest_cn_lists.py

      - name: Validate Entities
        run: |
          python schema/validate_entities.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase
          git add data/entities/cn.json data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh CN entity lists [skip ci]"
            git push
          fi
