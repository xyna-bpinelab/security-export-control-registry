name: Ingest Entity Lists

on:
  schedule:
    # Runs at 12:00 UTC daily (after the US CSL's ~05:00 US-Eastern daily refresh)
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest-us:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt

      - name: Ingest US Consolidated Screening List
        run: |
          python scripts/ingest/ingest_us_csl.py

      - name: Validate Entities
        run: |
          python schema/validate_entities.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/entities/us.json data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh US Consolidated Screening List [skip ci]"
            git push
          fi
