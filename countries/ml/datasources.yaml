datasources:
  - id: ml-wassenaar-arrangement
    name: "ワッセナー・アレンジメント（通常兵器及び関連汎用品・技術の輸出管理に関する国際的枠組み）"
    name_en: "Wassenaar Arrangement on Export Controls for Conventional Arms and Dual-Use Goods and Technologies"
    authority: "ワッセナー・アレンジメント事務局（ウィーン）"
    authority_en: "Wassenaar Arrangement Secretariat (Vienna)"
    category: "international_regime"
    url: "https://www.wassenaar.org/"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "通常兵器及びその関連汎用品・技術の輸出が地域の安定を損なわないよう、参加国間で情報交換と協調的な輸出管理を行う多国間の国際的枠組み（1996年設立、旧ココム（対共産圏輸出統制委員会）の後継）。条約ではなく参加国の政治的コミットメントに基づく任意の枠組みであり、参加国はガイドラインと規制品目リストを自国の輸出管理法令に反映させる。日本の輸出貿易管理令別表第1・外国為替令別表のリスト規制品目の多くは本枠組みの規制品目リストに準拠している。"
    summary_tree:
      - section: "基本文書"
        title: "ガイドライン及び手続（Guidelines & Procedures, including the Initial Elements）"
        summary: "参加国の目的、参加基準、意思決定手続（コンセンサス方式）、情報交換の枠組みを定める基本合意文書。法的拘束力はなく、参加国の政治的コミットメントに基づく。"
      - section: "軍需品リスト（Munitions List, ML1〜ML22）"
        title: "通常兵器関連貨物・技術"
        summary: "戦車、軍用車両、艦艇、軍用航空機、火器、弾薬等の軍需品及び関連技術を22のカテゴリに分類したリスト。参加国の輸出管理制度における武器関連規制品目の基礎となる。"
      - section: "汎用品・技術リスト（List of Dual-Use Goods and Technologies）"
        title: "先端素材・材料加工・エレクトロニクス等（センシティブ品目・機微品目）"
        summary: "軍事転用の可能性がある汎用品・技術を、先端材料、材料加工、エレクトロニクス、コンピュータ、通信、センサー、航法装置、海洋関連、推進装置等のカテゴリに分類。特に懸念度の高い品目は「センシティブ品目」「より慎重に扱うべき品目（Very Sensitive List）」として区分される。日本の輸出貿易管理令別表第1第5項〜第14項等に反映。"
      - section: "エンドユーザー情報の共有"
        title: "懸念のある取引に関する情報交換"
        summary: "参加国は、リスト非該当品目であっても懸念用途・懸念需要者に関する情報を任意で共有する仕組みを設けている（キャッチオール規制の運用に資する）。"

  - id: ml-nsg
    name: "原子力供給国グループ（原子力関連資機材・技術の輸出管理ガイドライン）"
    name_en: "Nuclear Suppliers Group (NSG) Guidelines"
    authority: "原子力供給国グループ事務局（ウィーン、IAEA内）"
    authority_en: "Nuclear Suppliers Group Secretariat (hosted at the IAEA, Vienna)"
    category: "international_regime"
    url: "https://www.nuclearsuppliersgroup.org/"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "原子力関連資機材・技術の輸出が核兵器等の拡散に用いられることを防止するため、参加国間でガイドライン及び規制品目リストの調和を図る多国間の輸出管理枠組み（インドの1974年核実験を契機に1974〜75年に発足）。条約ではなく、参加国が自国の輸出管理法令に反映させる政治的合意。"
    summary_tree:
      - section: "パート1：トリガーリスト（Trigger List）"
        title: "原子力専用品（核物質、原子炉及び関連装置等）"
        summary: "核物質（ウラン・プルトニウム等）、原子炉本体及び炉心関連装置、再処理・濃縮・燃料加工プラント関連設備など、原子力専用の資機材・技術を規定。これらの輸出には、受領国によるIAEA保障措置の受入等の条件（フルスコープ・セーフガード）が課される。"
      - section: "パート2：原子力関連汎用品・技術ガイドライン"
        title: "原子力関連汎用品・技術（デュアルユース品目）"
        summary: "原子力平和利用にも軍事転用にも用いられ得る汎用機器・材料・ソフトウェア・技術（高性能な工作機械、周波数変換器等）に関する輸出管理ガイドライン。日本の輸出貿易管理令別表第1第1項（原子力）等に反映。"
      - section: "全参加国の実施義務"
        title: "各国輸出管理法令への反映"
        summary: "NSGガイドライン自体に法的拘束力はないが、参加国は自国の国内法令（日本では輸出貿易管理令別表第1第1項等）を通じてリスト規制品目の輸出許可制を実施する。"

  - id: ml-mtcr
    name: "ミサイル技術管理レジーム（ミサイル関連汎用品・技術の輸出管理ガイドライン）"
    name_en: "Missile Technology Control Regime (MTCR)"
    authority: "MTCR議長国・情報交換ポイント（Points of Contact）"
    authority_en: "MTCR Chair / Points of Contact"
    category: "international_regime"
    url: "https://mtcr.info/"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "大量破壊兵器（核・生物・化学兵器）の運搬手段となり得るミサイル及び無人航空機（UAV）関連の資機材・技術の拡散を防止するための多国間の輸出管理枠組み（1987年設立）。条約ではなくパートナー国間の政治的コミットメントに基づく任意の枠組み。"
    summary_tree:
      - section: "MTCRガイドライン"
        title: "適用範囲及び輸出審査の基本方針"
        summary: "射程300km以上かつ搭載能力500kg以上のロケットシステム及び無人航空機システム（並びにこれらに転用可能なもの）を主な規制対象とし、参加国に対し輸出審査における強い抑制（strong presumption of denial）を求める。"
      - section: "機器・ソフトウェア及び技術附属書 カテゴリI"
        title: "ミサイル本体・主要構成品（完成品・主要サブシステム）"
        summary: "完成ロケットシステム・UAVシステム、ロケットエンジン、誘導装置、再突入体等の主要構成品を規定。カテゴリIIよりも厳格な輸出抑制の対象となる。"
      - section: "機器・ソフトウェア及び技術附属書 カテゴリII"
        title: "関連汎用品・技術（推進薬原料、複合材料、試験装置等）"
        summary: "推進薬原料、耐熱材料、複合材料、慣性航法装置、各種試験・製造設備等、ミサイル開発に転用され得る汎用品・技術を規定。日本の輸出貿易管理令別表第1第4項（ミサイル）等に反映。"

  - id: ml-australia-group
    name: "オーストラリア・グループ（化学・生物兵器関連資機材・技術の輸出管理ガイドライン）"
    name_en: "Australia Group"
    authority: "オーストラリア・グループ議長国（オーストラリア外務貿易省）"
    authority_en: "Australia Group Chair (Australian Department of Foreign Affairs and Trade)"
    category: "international_regime"
    url: "https://www.australiagroup.net/"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "化学兵器・生物兵器の拡散を防止するため、その原料・製造設備・関連技術の輸出管理について参加国間で情報交換とガイドラインの調和を図る多国間の枠組み（1985年設立、化学兵器禁止条約（CWC）・生物兵器禁止条約（BWC）を補完）。条約ではなく参加国の自主的な政策協調の枠組み。"
    summary_tree:
      - section: "化学兵器前駆物質リスト（Chemical Weapons Precursors）"
        title: "化学兵器の原料となり得る化学物質"
        summary: "神経剤（サリン等）やびらん剤（マスタードガス等）の原料となり得る化学物質を規制対象として指定。日本の輸出貿易管理令別表第1第3項（化学兵器）等に反映。"
      - section: "生物剤・病原体・毒素リスト（Biological Agents）"
        title: "生物兵器に転用され得る病原体・毒素"
        summary: "人・動物・植物に対する病原性微生物及び毒素のうち、生物兵器に転用され得るものを規制対象として指定。日本の輸出貿易管理令別表第1第3項の2（生物兵器）等に反映。"
      - section: "デュアルユース化学・生物製造設備リスト"
        title: "化学・生物兵器製造に転用され得る汎用製造設備"
        summary: "発酵槽、噴霧乾燥機、特殊仕様のバルブ・配管等、化学剤・生物剤の製造に転用され得る汎用製造設備・関連技術を規定。"
      - section: "参加国間の情報交換"
        title: "懸念のある取引・需要者情報の共有"
        summary: "参加国は、リスト規制品目に加え、懸念のある取引（懸念需要者・懸念用途）に関する情報を定期会合等を通じて共有し、各国の輸出審査に活用する。"
