datasources:
  - id: jp-foreign-exchange-act
    name: "外国為替及び外国貿易法"
    name_en: "Foreign Exchange and Foreign Trade Act"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "law"
    url: "https://laws.e-gov.go.jp/document?lawid=324AC0000000228"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/324AC0000000228"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "日本の外国為替および対外貿易管理の基本法。安保輸出管理の根拠法。"
    summary_tree:
      - section: "第2章（第10条～第15条）"
        title: "我が国の平和及び安全の維持のための措置"
        summary: "国際的な平和及び安全の維持を妨げることとなると認められる対内直接投資等について、内閣総理大臣及び財務大臣が是正措置を求めることができる旨を規定。"
      - section: "第4章（第20条～第25条の2）"
        title: "資本取引等（技術提供取引の許可）"
        summary: "居住者が非居住者に対し特定技術を提供することを目的とする取引（役務取引）について、経済産業大臣の許可を要する場合を規定（第25条）。安全保障貿易管理における技術（役務）規制の根拠条文。"
      - section: "第6章（第47条～第54条）"
        title: "外国貿易（輸出の許可等）"
        summary: "貨物の輸出について経済産業大臣の許可・承認を要する場合を規定（第48条）。安全保障貿易管理における貨物規制及びキャッチオール規制の根拠条文。"
      - section: "第9章（第69条の7～第73条）"
        title: "罰則"
        summary: "無許可輸出等、本法及び関連政省令の規定に違反した場合の懲役・罰金等の刑事罰を規定。"

  - id: jp-export-control-order
    name: "輸出貿易管理令"
    name_en: "Export Control Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "cabinet_order"
    url: "https://laws.e-gov.go.jp/document?lawid=324CO0000000378"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/324CO0000000378"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "外為法に基づき、輸出許可・承認の対象となる貨物を指定する政令（別表第1に規制貨物を規定）。"
    summary_tree:
      - section: "別表第1第1項"
        title: "武器"
        summary: "軍用の火器、弾薬、戦車、戦闘機、艦艇、各種ミリタリー用機材など、直接戦闘に用いられる兵器全般の輸出規制。"
      - section: "別表第1第2項"
        title: "原子力"
        summary: "核兵器の製造等に転用可能な核物質（ウラン等）、原子炉およびその関連装置、並びに核物質専用の処理・加工機材の輸出規制。"
      - section: "別表第1第3項"
        title: "化学兵器"
        summary: "軍用化学製剤及びその原料、並びに化学製剤の製造装置の輸出規制。"
      - section: "別表第1第3項の2"
        title: "生物兵器"
        summary: "軍用細菌製剤の原料及びその開発・製造装置の輸出規制。"
      - section: "別表第1第4項"
        title: "ミサイル"
        summary: "ロケット、無人航空機及びその推進装置・誘導装置・複合材料等、ミサイル関連汎用品の輸出規制。"
      - section: "別表第1第5項"
        title: "先端素材"
        summary: "フッ素化合物製品、芳香族ポリイミド、超伝導材料等、兵器の高性能化に資する先端材料の輸出規制。"
      - section: "別表第1第6項"
        title: "材料加工"
        summary: "数値制御工作機械、アイソスタチックプレス、ロボット等、材料加工に用いられる汎用機器の輸出規制。"
      - section: "別表第1第7項"
        title: "エレクトロニクス"
        summary: "集積回路、超伝導磁石、周波数シンセサイザー等の電子部品・装置の輸出規制。"
      - section: "別表第1第8項"
        title: "コンピュータ"
        summary: "一定の処理能力を超える高性能デジタルコンピュータ、関連アセンブリ等の輸出規制。"
      - section: "別表第1第9項"
        title: "通信関連"
        summary: "暗号装置、光ファイバー通信ケーブル、フェーズドアレーアンテナ等の通信機器の輸出規制。"
      - section: "別表第1第10項"
        title: "センサー等"
        summary: "水中探知装置、光検出器、磁力計、レーダー等のセンサー機器の輸出規制。"
      - section: "別表第1第11項"
        title: "航法装置"
        summary: "加速度計、ジャイロスコープ、慣性航行装置等、航法に用いられる機器の輸出規制。"
      - section: "別表第1第12項"
        title: "海洋関連"
        summary: "潜水艇・水中船等の船舶及びその部分品、水中ロボット等、海洋関連貨物の輸出規制。"
      - section: "別表第1第13項"
        title: "推進装置"
        summary: "ガスタービンエンジン、ロケット推進装置、無人航空機等、推進関連貨物の輸出規制。"
      - section: "別表第1第14項"
        title: "その他"
        summary: "粉末状金属燃料、ディーゼルエンジン、簡易爆発装置の除去装置等、他の項目に属さない関連汎用品の輸出規制。"
      - section: "別表第1第15項"
        title: "機微品目"
        summary: "無機繊維、電波の吸収材、単独潜水艇等、特に機微性の高い汎用品の輸出規制。"
      - section: "別表第1第16項"
        title: "補完的輸出規制（キャッチオール規制）"
        summary: "1項から15項までのリスト規制品目以外の貨物であっても、大量破壊兵器や通常兵器の開発等に用いられる懸念がある場合に許可を必要とする規制。"

  - id: jp-foreign-exchange-order
    name: "外国為替令"
    name_en: "Foreign Exchange Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "cabinet_order"
    url: "https://laws.e-gov.go.jp/document?lawid=355CO0000000260"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/355CO0000000260"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "外為法に基づき、技術の提供（役務取引）に係る許可手続などを規定する政令（別表に規制技術を規定）。別表の項番構成は輸出貿易管理令別表第1（貨物）と対応している。"
    summary_tree:
      - section: "別表第1項"
        title: "武器関連技術"
        summary: "軍用の火器・爆発物・軍用車両等の設計、製造又は使用に係る技術の提供規制。"
      - section: "別表第2項"
        title: "原子力関連技術"
        summary: "核燃料物質の分離・再処理、原子炉の設計等、核兵器製造に転用可能な技術の提供規制。"
      - section: "別表第3項"
        title: "化学兵器関連技術"
        summary: "軍用化学製剤の製造技術の提供規制。"
      - section: "別表第3項の2"
        title: "生物兵器関連技術"
        summary: "軍用細菌製剤の開発・製造技術の提供規制。"
      - section: "別表第4項"
        title: "ミサイル関連技術"
        summary: "ロケットの設計、製造又は試験に係る技術の提供規制。"
      - section: "別表第5項"
        title: "先端素材関連技術"
        summary: "先端材料の製造技術の提供規制。"
      - section: "別表第6項"
        title: "材料加工関連技術"
        summary: "数値制御工作機械等の製造技術の提供規制。"
      - section: "別表第7項"
        title: "エレクトロニクス関連技術"
        summary: "集積回路等の設計・製造技術の提供規制。"
      - section: "別表第8項"
        title: "コンピュータ関連技術"
        summary: "高性能電子計算機の設計・製造技術の提供規制。"
      - section: "別表第9項"
        title: "通信関連技術"
        summary: "暗号装置等の設計・製造技術の提供規制。"
      - section: "別表第10項"
        title: "センサー等関連技術"
        summary: "センサー機器の設計・製造技術の提供規制。"
      - section: "別表第11項"
        title: "航法装置関連技術"
        summary: "慣性航行装置等の設計・製造技術の提供規制。"
      - section: "別表第12項"
        title: "海洋関連技術"
        summary: "潜水艇等の設計・製造技術の提供規制。"
      - section: "別表第13項"
        title: "推進装置関連技術"
        summary: "ガスタービンエンジン等の設計・製造技術の提供規制。"
      - section: "別表第14項"
        title: "その他関連技術"
        summary: "上記各項に属さない汎用品に関する技術の提供規制。"
      - section: "別表第15項"
        title: "機微品目関連技術"
        summary: "機微性の高い汎用品に関する技術の提供規制。"
      - section: "別表第16項"
        title: "補完的技術規制（キャッチオール規制）"
        summary: "1項から15項までのリスト規制技術以外であっても、大量破壊兵器等の開発等に用いられる懸念がある場合に許可を必要とする技術提供規制。"

  - id: jp-cargo-tech-ministerial-order
    name: "輸出貿易管理令別表第一及び外国為替令別表の規定に基づき貨物又は技術を定める省令"
    name_en: "Ministerial Order on Cargo or Technology to be Established Based on the Appended Table 1 of the Export Control Order and the Appended Table of the Foreign Exchange Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "ministerial_order"
    url: "https://laws.e-gov.go.jp/document?lawid=403M50000400049"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/403M50000400049"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "通称「貨物等省令」。リスト規制品目の詳細なスペック（性能・機能要件）を定義する省令。"
    summary_tree:
      - section: "第1条～第14条（全体構成）"
        title: "別表第1・外為令別表の技術仕様の定義"
        summary: "輸出令別表第1及び外為令別表の各項（武器～機微品目）について、規制対象となる貨物・技術の性能要件や仕様基準を条文ごとに規定する。条番号はおおむね別表の項番号に対応する（例：第1条＝原子力、第3条＝ミサイル、第5条＝材料加工、第7条＝コンピュータ等）。※詳細な数値基準は一次資料（官報・条文）の確認が必要。"
      - section: "第1条"
        title: "原子力関連貨物・技術の仕様"
        summary: "核燃料物質、原子炉関連装置、ウラン濃縮用遠心分離器等について、輸出規制の対象となる技術仕様（性能値・処理能力等の数値基準）を規定。"
      - section: "第7条"
        title: "コンピュータ関連貨物・技術の仕様"
        summary: "輸出規制の対象となる電子計算機の処理能力基準等を規定。"

  - id: jp-export-circular
    name: "輸出貿易管理令の運用について（輸出注意事項63第13号・63貿局第322号）"
    name_en: "Circular on the Administration of the Export Control Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "circular"
    url: "https://www.meti.go.jp/policy/anpo/law_document/tutatu/26fy/unyou_tsutatsu.pdf"
    format: "pdf"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "通称「輸出令運用通達」。輸出許可申請手続きや該非判定における解釈基準を定めた通達。"
    summary_tree:
      - section: "総論"
        title: "該非判定における解釈の基本方針"
        summary: "輸出令別表第1の各項に掲げる貨物の該非判定に関する経済産業省の統一的な解釈基準及び運用上の留意事項を定める。※項目ごとの詳細な解釈規定は一次資料（通達本文）の確認が必要。"
      - section: "別表第1第16項運用"
        title: "キャッチオール規制の運用手続き"
        summary: "需要者要件・用途要件に基づく許可申請の要否判断手続き、及び経済産業省からのインフォーム制度の運用について規定。"

  - id: jp-service-circular
    name: "貿易関係貿易外取引等に関する省令の許可を要する技術の提供取引等を定める件の運用について（平成25・12・19貿局第1号）"
    name_en: "Circular on the Administration of Service/Technology Export Control"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "circular"
    url: "https://www.meti.go.jp/policy/anpo/law_document/tutatu/tutatu24fy/ekimu_tutatu.pdf"
    format: "pdf"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "通称「役務通達」。技術提供取引（外為法25条関連）に関する許可基準や解釈を定めた通達。"
    summary_tree:
      - section: "許可を要する技術提供取引"
        title: "外為法25条・外為令17条に基づく許可対象技術"
        summary: "輸出令別表第1及び外為令別表に掲げる貨物の設計・製造・使用に係る技術を非居住者に提供する取引について、許可を要する場合の判断基準を規定。"
      - section: "許可を要しない取引（許可例外）"
        title: "公知の技術・包括許可等の例外規定"
        summary: "公知となっている技術の提供、政府間協定に基づく提供等、許可を要しない場合や包括許可の対象となる場合について規定。"

  - id: jp-submission-documents-circular
    name: "輸出許可・役務取引許可・特定記録媒体等輸出等許可申請に係る提出書類及び注意事項等について（平成24・03・23貿局第1号・輸出注意事項24第18号）"
    name_en: "Circular on Documents to be Submitted for Export License, Service Transaction License, and Specific Recording Media Export License Applications"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "circular"
    url: "https://www.meti.go.jp/policy/anpo/apply12.html"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "通称「提出書類通達」。輸出許可・役務取引許可・特定記録媒体等輸出等許可の申請に際して提出すべき様式（様式1～24）とその記載要領・注意事項を定めた通達。必要書類は規制品目の該当項番と仕向地の組み合わせにより異なる。"
    summary_tree:
      - section: "様式1"
        title: "許可申請内容明細書"
        summary: "輸出許可・役務（プログラム）取引許可申請の内容を記載する基本様式。該非判定の対象となる貨物・技術の仕様等を明細書として提出する。"
      - section: "様式2〜4・7"
        title: "最終用途誓約書・最終用途証明書（需要者の誓約）"
        summary: "需要者による最終用途・最終需要者に関する誓約書（最終需要者確定／未確定、CWC規制品目向け）、及びCWCに基づく輸入国政府発行の最終用途証明書。キャッチオール規制及びリスト規制の許可審査における需要者確認の中核書類。"
      - section: "様式8・9"
        title: "授権証明書・委任状"
        summary: "申請者が需要者から取引の授権を受けていることを証する授権証明書、及び代理人による申請手続を委任する委任状。"
      - section: "様式16〜18"
        title: "許可条件の履行確認（据付報告・受領確認等）"
        summary: "輸出許可・役務取引許可に付された条件の履行状況を報告する書類（据付報告書、受領確認書、許可条件履行書類）。許可後の事後管理（コンプライアンス）に関する提出書類。"
      - section: "様式14・15・19〜23"
        title: "再輸出・再販売等に関する事前同意手続"
        summary: "許可条件として付される「需要者による再輸出・再販売等に係る事前同意」の手続に関する相談書・報告書群。需要者が無断で再輸出等を行ったことを把握した場合の報告義務（様式14）や、事前同意に関する相談・要請手続（様式19〜23）を規定。"

  - id: jp-end-user-list
    name: "外国ユーザーリスト"
    name_en: "End-User List"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "sanction_list"
    url: "https://www.meti.go.jp/press/2025/09/20250929006/20250929006.html"
    format: "pdf"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "大量破壊兵器等の開発等に関与している疑いがある外国の企業・組織のリスト。キャッチオール規制の判定に用いられる。掲載URLは改正の都度METIのプレスリリースページが更新されるため、最新版の確認が必要。"
    summary_tree:
      - section: "掲載組織の選定基準"
        title: "大量破壊兵器等の懸念"
        summary: "核兵器、化学兵器、生物兵器、ミサイルなどの大量破壊兵器や通常兵器の開発、製造、使用、貯蔵に関与していると疑われる組織。"
      - section: "主な対象国・地域"
        title: "懸念国リスト"
        summary: "イラン、北朝鮮、中国、ロシア、パキスタンなどに所在する企業や大学、研究機関が多く掲載されており、これらの組織と取引する際は原則として経済産業大臣の許可が必要。"
