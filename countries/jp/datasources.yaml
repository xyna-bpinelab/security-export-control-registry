datasources:
  - id: jp-foreign-exchange-act
    name: "外国為替及び外国貿易法"
    name_en: "Foreign Exchange and Foreign Trade Act"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "law"
    url: "https://laws.e-gov.go.jp/document?lawid=324AC0000000228"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/324AC0000000228"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "日本の外国為替および対外貿易管理の基本法。安保輸出管理の根拠法。"
    summary_tree:
      - section: "第6条"
        title: "定義（居住者・非居住者、貨物等の用語の定義）"
        summary: "本邦・外国、本邦通貨・外国通貨、居住者・非居住者（第5号・第6号）、支払手段、貨物（第15号：貴金属・支払手段・証券等以外の動産）等、本法及び本法に基づく命令で用いる主要な用語の定義を規定。居住者・非居住者の区分は、資本取引規制（第20条以下）及び輸出規制（第48条）等、本法の各種規制の適用範囲を画する基本概念となる。"
      - section: "第2章（第10条～第15条）"
        title: "我が国の平和及び安全の維持のための措置"
        summary: "国際的な平和及び安全の維持を妨げることとなると認められる対内直接投資等について、内閣総理大臣及び財務大臣が是正措置を求めることができる旨を規定。"
      - section: "第4章（第20条～第25条の2）"
        title: "資本取引等（技術提供取引の許可）"
        summary: "居住者が非居住者に対し特定技術を提供することを目的とする取引（役務取引）について、経済産業大臣の許可を要する場合を規定（第25条）。安全保障貿易管理における技術（役務）規制の根拠条文。"
      - section: "第6章（第47条～第54条）"
        title: "外国貿易（輸出の許可等）"
        summary: "貨物の輸出について経済産業大臣の許可・承認を要する場合を規定（第48条）。安全保障貿易管理における貨物規制及びキャッチオール規制の根拠条文。"
      - section: "第9章（第69条の7～第73条）"
        title: "罰則"
        summary: "無許可輸出等、本法及び関連政省令の規定に違反した場合の懲役・罰金等の刑事罰を規定。"

  - id: jp-export-control-order
    name: "輸出貿易管理令"
    name_en: "Export Control Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "cabinet_order"
    url: "https://laws.e-gov.go.jp/document?lawid=324CO0000000378"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/324CO0000000378"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "外為法に基づき、輸出許可・承認の対象となる貨物を指定する政令（別表第1に規制貨物を規定）。"
    summary_tree:
      - section: "第1条"
        title: "輸出の許可（別表第1・キャッチオール規制対象の許可根拠）"
        summary: "外為法48条1項に規定する「特定の地域を仕向地とする特定の種類の貨物の輸出」を、別表第1中欄の貨物をその下欄記載の地域に輸出する行為と定義。別表第1第16項（キャッチオール規制）の貨物を別表第3記載の地域に輸出する場合は、外為法48条2項に基づき別途、経済産業大臣の許可を要する。"
      - section: "第4条"
        title: "特例（許可を要しない場合）"
        summary: "仮陸揚げ貨物、外国貿易船・航空機の船用品・航空機用品、国際機関・在外公館宛ての公用貨物、無償で輸出入する貨物等について、外為法48条1項の許可を要しないこととする特例を規定。別表第1第5項から第13項又は第15項の貨物で総価額が少額（原則100万円以下、別表第3の3に掲げる貨物は5万円以下）のもの等も対象となるが、仕向地が別表第4（イラン・イラク・北朝鮮）の場合は特例の対象外となる。"
      - section: "第5条"
        title: "税関の確認等"
        summary: "税関は、経済産業大臣の指示に従い、輸出しようとする者が外為法48条1項・本令1条3項の許可又は2条1項の承認を受けていること、又はこれらを要しないことを確認しなければならない旨を規定。確認結果は経済産業大臣に通知される。"
      - section: "第8条"
        title: "許可及び承認の有効期間"
        summary: "外為法48条1項・本令1条3項の許可及び2条1項の承認の有効期間は、許可・承認の日から6か月。経済産業大臣は特に必要があると認めるときは、異なる有効期間を定め、又は延長することができる。"
      - section: "第9条"
        title: "法令の違反に対する制裁の通知"
        summary: "経済産業大臣は、外為法53条1項又は2項の規定による処分（違反者に対する輸出等の禁止等の制裁）をしたときは、遅滞なくその旨を税関に通知する。"
      - section: "第10条"
        title: "使用人（法人役員等への罰則適用上の「使用人」の範囲）"
        summary: "外為法53条4項1号に規定する「使用人」の範囲として、営業所・事務所の業務を統括する者等（経済産業省令で定める者）、及び同条1項・2項により禁止された業務を統括する者等（経済産業省令で定める者）を規定。"
      - section: "第14条"
        title: "核兵器等の開発等に用いられるおそれが特に大きい貨物"
        summary: "外為法69条の7第2項第2号に規定する政令で定める貨物として、別表第1第1項（原子力、（五）（六）（十）から（十二）を除く）及び第2項から第4項（化学兵器・生物兵器・ミサイル）の中欄に掲げる貨物（核兵器等を除く）を規定。これらは通常のキャッチオール規制の客観要件によらず、経済産業大臣が個別に許可申請を求める通知を行うことができる、特に懸念の大きい貨物として扱われる。"
      - section: "別表第1第1項"
        title: "武器"
        summary: "軍用の火器、弾薬、戦車、戦闘機、艦艇、各種ミリタリー用機材など、直接戦闘に用いられる兵器全般の輸出規制。"
      - section: "別表第1第2項"
        title: "原子力"
        summary: "核兵器の製造等に転用可能な核物質（ウラン等）、原子炉およびその関連装置、並びに核物質専用の処理・加工機材の輸出規制。"
      - section: "別表第1第3項"
        title: "化学兵器"
        summary: "軍用化学製剤及びその原料、並びに化学製剤の製造装置の輸出規制。"
      - section: "別表第1第3項の2"
        title: "生物兵器"
        summary: "軍用細菌製剤の原料及びその開発・製造装置の輸出規制。"
      - section: "別表第1第4項"
        title: "ミサイル"
        summary: "ロケット、無人航空機及びその推進装置・誘導装置・複合材料等、ミサイル関連汎用品の輸出規制。"
      - section: "別表第1第5項"
        title: "先端素材"
        summary: "フッ素化合物製品、芳香族ポリイミド、超伝導材料等、兵器の高性能化に資する先端材料の輸出規制。"
      - section: "別表第1第6項"
        title: "材料加工"
        summary: "数値制御工作機械、アイソスタチックプレス、ロボット等、材料加工に用いられる汎用機器の輸出規制。"
      - section: "別表第1第7項"
        title: "エレクトロニクス"
        summary: "集積回路、超伝導磁石、周波数シンセサイザー等の電子部品・装置の輸出規制。"
      - section: "別表第1第8項"
        title: "コンピュータ"
        summary: "一定の処理能力を超える高性能デジタルコンピュータ、関連アセンブリ等の輸出規制。"
      - section: "別表第1第9項"
        title: "通信関連"
        summary: "暗号装置、光ファイバー通信ケーブル、フェーズドアレーアンテナ等の通信機器の輸出規制。"
      - section: "別表第1第10項"
        title: "センサー等"
        summary: "水中探知装置、光検出器、磁力計、レーダー等のセンサー機器の輸出規制。"
      - section: "別表第1第11項"
        title: "航法装置"
        summary: "加速度計、ジャイロスコープ、慣性航行装置等、航法に用いられる機器の輸出規制。"
      - section: "別表第1第12項"
        title: "海洋関連"
        summary: "潜水艇・水中船等の船舶及びその部分品、水中ロボット等、海洋関連貨物の輸出規制。"
      - section: "別表第1第13項"
        title: "推進装置"
        summary: "ガスタービンエンジン、ロケット推進装置、無人航空機等、推進関連貨物の輸出規制。"
      - section: "別表第1第14項"
        title: "その他"
        summary: "粉末状金属燃料、ディーゼルエンジン、簡易爆発装置の除去装置等、他の項目に属さない関連汎用品の輸出規制。"
      - section: "別表第1第15項"
        title: "機微品目"
        summary: "無機繊維、電波の吸収材、単独潜水艇等、特に機微性の高い汎用品の輸出規制。"
      - section: "別表第1第16項"
        title: "補完的輸出規制（キャッチオール規制）"
        summary: "1項から15項までのリスト規制品目以外の貨物であっても、大量破壊兵器や通常兵器の開発等に用いられる懸念がある場合に許可を必要とする規制。"
      - section: "別表第3（第4条関係）"
        title: "第4条の特例（許可不要の範囲）の適用上、緩やかに扱われる地域"
        summary: "アルゼンチン、オーストラリア、オーストリア、ベルギー、ブルガリア、カナダ、チェコ、デンマーク、フィンランド、フランス、ドイツ、ギリシャ、ハンガリー、アイルランド、イタリア、大韓民国、ルクセンブルク、オランダ、ニュージーランド、ノルウェー、ポーランド、ポルトガル、スペイン、スウェーデン、スイス、英国、アメリカ合衆国の27か国を規定。仮陸揚げ貨物や少額貨物等について許可を要しないこととする第4条の特例の適用範囲を仕向地により区分する基準として用いられる。"
      - section: "別表第3の2（第4条関係）"
        title: "武力紛争・武器禁輸等に関する仕向地区分"
        summary: "アフガニスタン、中央アフリカ、コンゴ民主共和国、イラク、レバノン、リビア、北朝鮮、ソマリア、南スーダン、スーダンの10か国・地域を規定。別表第1第16項（二）に掲げる貨物（キャッチオール規制対象）に係る第4条の特例の適用範囲を仕向地により区分する基準として用いられる。"
      - section: "別表第3の3（第4条関係）"
        title: "少額貨物特例における低額基準の対象品目"
        summary: "別表第1第5項・第7項・第8項・第9項・第10項・第12項・第13項の中欄に掲げる貨物のうち経済産業大臣が告示で定めるもの、及び第15項の中欄に掲げる貨物を規定。第4条の少額貨物に係る特例の金額基準は原則総価額100万円以下だが、本表に掲げる貨物は5万円以下に厳格化される。"
      - section: "別表第4（第4条関係）"
        title: "第4条の特例（許可不要の範囲）の適用対象から除外される地域"
        summary: "イラン、イラク、北朝鮮の3か国を規定。第4条に定める許可不要の特例（別表第1の5から13まで又は15の項に掲げる貨物のうち総価額100万円以下のもの等）について、これらの地域を仕向地とする場合は特例の対象から除外され、許可不要の扱いを受けられない。"

  - id: jp-foreign-exchange-order
    name: "外国為替令"
    name_en: "Foreign Exchange Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "cabinet_order"
    url: "https://laws.e-gov.go.jp/document?lawid=355CO0000000260"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/355CO0000000260"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "外為法に基づき、技術の提供（役務取引）に係る許可手続などを規定する政令（別表に規制技術を規定）。別表の項番構成は輸出貿易管理令別表第1（貨物）と対応している。"
    summary_tree:
      - section: "別表第1項"
        title: "武器関連技術"
        summary: "軍用の火器・爆発物・軍用車両等の設計、製造又は使用に係る技術の提供規制。"
      - section: "別表第2項"
        title: "原子力関連技術"
        summary: "核燃料物質の分離・再処理、原子炉の設計等、核兵器製造に転用可能な技術の提供規制。"
      - section: "別表第3項"
        title: "化学兵器関連技術"
        summary: "軍用化学製剤の製造技術の提供規制。"
      - section: "別表第3項の2"
        title: "生物兵器関連技術"
        summary: "軍用細菌製剤の開発・製造技術の提供規制。"
      - section: "別表第4項"
        title: "ミサイル関連技術"
        summary: "ロケットの設計、製造又は試験に係る技術の提供規制。"
      - section: "別表第5項"
        title: "先端素材関連技術"
        summary: "先端材料の製造技術の提供規制。"
      - section: "別表第6項"
        title: "材料加工関連技術"
        summary: "数値制御工作機械等の製造技術の提供規制。"
      - section: "別表第7項"
        title: "エレクトロニクス関連技術"
        summary: "集積回路等の設計・製造技術の提供規制。"
      - section: "別表第8項"
        title: "コンピュータ関連技術"
        summary: "高性能電子計算機の設計・製造技術の提供規制。"
      - section: "別表第9項"
        title: "通信関連技術"
        summary: "暗号装置等の設計・製造技術の提供規制。"
      - section: "別表第10項"
        title: "センサー等関連技術"
        summary: "センサー機器の設計・製造技術の提供規制。"
      - section: "別表第11項"
        title: "航法装置関連技術"
        summary: "慣性航行装置等の設計・製造技術の提供規制。"
      - section: "別表第12項"
        title: "海洋関連技術"
        summary: "潜水艇等の設計・製造技術の提供規制。"
      - section: "別表第13項"
        title: "推進装置関連技術"
        summary: "ガスタービンエンジン等の設計・製造技術の提供規制。"
      - section: "別表第14項"
        title: "その他関連技術"
        summary: "上記各項に属さない汎用品に関する技術の提供規制。"
      - section: "別表第15項"
        title: "機微品目関連技術"
        summary: "機微性の高い汎用品に関する技術の提供規制。"
      - section: "別表第16項"
        title: "補完的技術規制（キャッチオール規制）"
        summary: "1項から15項までのリスト規制技術以外であっても、大量破壊兵器等の開発等に用いられる懸念がある場合に許可を必要とする技術提供規制。"

  - id: jp-cargo-tech-ministerial-order
    name: "輸出貿易管理令別表第一及び外国為替令別表の規定に基づき貨物又は技術を定める省令"
    name_en: "Ministerial Order on Cargo or Technology to be Established Based on the Appended Table 1 of the Export Control Order and the Appended Table of the Foreign Exchange Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "ministerial_order"
    url: "https://laws.e-gov.go.jp/document?lawid=403M50000400049"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/403M50000400049"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "通称「貨物等省令」。リスト規制品目の詳細なスペック（性能・機能要件）を定義する省令。"
    summary_tree:
      - section: "第1条～第14条（全体構成）"
        title: "別表第1・外為令別表の技術仕様の定義"
        summary: "輸出令別表第1及び外為令別表の各項（武器～機微品目）について、規制対象となる貨物・技術の性能要件や仕様基準を条文ごとに規定する。条番号はおおむね別表の項番号に対応する（例：第1条＝原子力、第3条＝ミサイル、第5条＝材料加工、第7条＝コンピュータ等）。※詳細な数値基準は一次資料（官報・条文）の確認が必要。"
      - section: "第1条"
        title: "原子力関連貨物・技術の仕様"
        summary: "核燃料物質、原子炉関連装置、ウラン濃縮用遠心分離器等について、輸出規制の対象となる技術仕様（性能値・処理能力等の数値基準）を規定。"
      - section: "第7条"
        title: "コンピュータ関連貨物・技術の仕様"
        summary: "輸出規制の対象となる電子計算機の処理能力基準等を規定。"

  - id: jp-export-circular
    name: "輸出貿易管理令の運用について（輸出注意事項63第13号・63貿局第322号）"
    name_en: "Circular on the Administration of the Export Control Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "circular"
    url: "https://www.meti.go.jp/policy/anpo/law_document/tutatu/26fy/unyou_tsutatsu.pdf"
    format: "pdf"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "通称「輸出令運用通達」。輸出許可申請手続きや該非判定における解釈基準を定めた通達。"
    summary_tree:
      - section: "総論"
        title: "該非判定における解釈の基本方針"
        summary: "輸出令別表第1の各項に掲げる貨物の該非判定に関する経済産業省の統一的な解釈基準及び運用上の留意事項を定める。※項目ごとの詳細な解釈規定は一次資料（通達本文）の確認が必要。"
      - section: "別表第1第16項運用"
        title: "キャッチオール規制の運用手続き"
        summary: "需要者要件・用途要件に基づく許可申請の要否判断手続き、及び経済産業省からのインフォーム制度の運用について規定。"

  - id: jp-service-circular
    name: "外国為替及び外国貿易法第25条第1項及び外国為替令第17条第2項から第4項までの規定に基づき許可を要する技術を提供する取引又は行為について（4貿局第492号）"
    name_en: "Circular on the Administration of Service/Technology Export Control (No. 4-Boekikyoku-492)"
    authority: "経済産業省貿易経済協力局"
    authority_en: "Trade and Economic Cooperation Bureau, Ministry of Economy, Trade and Industry"
    category: "circular"
    url: "https://www.meti.go.jp/policy/anpo/law_document/tutatu/t10kaisei/ekimu_tutatu.pdf"
    format: "pdf"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "通称「役務通達」。平成4年12月21日発出（4貿局第492号）、最終改正は輸出注意事項2025第27号（令和7年11月14日公布・令和8年2月14日施行）。技術提供取引（外為法25条・外為令17条関連）に関する許可基準や用語の解釈を定めた通達。令和4年5月1日実施の改正により、外国法人等・外国政府等の指揮命令下にある居住者等を非居住者と同様に扱う、いわゆる「みなし非居住者」規制（1（3）サの「特定類型」）が導入されている。"
    summary_tree:
      - section: "許可を要する技術提供取引"
        title: "外為法25条・外為令17条に基づく許可対象技術"
        summary: "輸出令別表第1及び外為令別表に掲げる貨物の設計・製造・使用に係る技術を非居住者に提供する取引について、許可を要する場合の判断基準を規定。"
      - section: "許可を要しない取引（許可例外）"
        title: "公知の技術・包括許可等の例外規定"
        summary: "公知となっている技術の提供、政府間協定に基づく提供等、許可を要しない場合や包括許可の対象となる場合について規定。"
      - section: "1（3）サ"
        title: "取引・特定取引の定義、及び「特定類型」（みなし非居住者）の新設"
        summary: "「取引」とは有償無償を問わず当事者双方の合意に基づくものをいい、「提供することを目的とする取引」とは特定国において又は特定国の非居住者に対して技術を提供することを内容とする取引をいう旨を定義。加えて、外国法人等・外国政府等の指揮命令に服し若しくはこれらに善管注意義務を負う者（①）、外国政府等から多額の金銭その他の利益を得ている者（②）、本邦における行動に関し外国政府等の指示又は依頼を受ける者（③）に該当する自然人である居住者を「特定類型」と定義し、特定類型に対して技術を提供する取引（「特定取引」）を、特定国の非居住者に対する技術提供と同様に扱う（令和4年5月1日実施）。特定類型該当性の確認方法は別紙１－３に示される。"
      - section: "別紙１－３"
        title: "特定類型の該当性の判断に係るガイドライン"
        summary: "取引の相手方となる居住者が特定類型①～③に該当するか否かを判断するためのガイドライン。相手方が提供者の指揮命令下にない場合は、役務取引実施までに通常取得する契約書等の記載から該当性が明らかなときに限り確認義務を負い、指揮命令下にある場合は指揮命令に服した時点での自己申告及びその後の該当性変更の報告の仕組みにより通常果たすべき注意義務を履行しているものと解される。いずれの場合も、経済産業省から該当可能性がある旨の連絡を受けたにもかかわらず漫然と技術提供を行うことは、注意義務を履行していないものと解される。"

  - id: jp-submission-documents-circular
    name: "輸出許可・役務取引許可・特定記録媒体等輸出等許可申請に係る提出書類及び注意事項等について（輸出注意事項24第18号・平成24・03・23貿局第1号）"
    name_en: "Circular on Documents to be Submitted for Export License, Service Transaction License, and Specific Recording Media Export License Applications"
    authority: "経済産業省貿易経済協力局"
    authority_en: "Trade and Economic Cooperation Bureau, Ministry of Economy, Trade and Industry"
    category: "circular"
    url: "https://www.meti.go.jp/policy/anpo/law_document/tutatu/tsutatsu_teisyutsusyorui.pdf"
    format: "pdf"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "通称「提出書類通達」。平成24年4月2日発出（輸出注意事項24第18号・平成24・03・23貿局第1号）、最終改正は輸出注意事項2025第27号（令和7年11月14日公布・令和8年2月14日施行）。外為法25条・48条・55条の8、外為令17条に基づく輸出許可・役務取引許可・特定記録媒体等輸出等許可の申請に際して提出すべき書類（別表1〜4）、最終用途誓約書の取扱い、及び許可後の事前同意手続等を定める全92ページの通達（様式1〜24を含む）。"
    summary_tree:
      - section: "I．許可申請前の確認事項"
        title: "需要者・用途・仕様等に関する19項目の確認（大量破壊兵器等の懸念チェック）"
        summary: "許可申請の前に輸出者・提供者が実施すべき事項として、需要者等の存在、貨物等の用途・仕様、設置場所等の態様・据付条件、関連設備・装置の条件、表示・船積み・輸送ルート・梱包等の態様、支払対価等・保証の条件、据付けの辞退や秘密保持等の態様について計19項目の確認事項（①〜⑲）を規定。いずれかが「いいえ」となる場合は特に慎重な確認に努めることを求める。"
      - section: "I－2．電子申請"
        title: "電子情報処理組織を使用した申請の原則義務化"
        summary: "令和4年7月1日以降、輸出許可申請・役務取引許可申請等は「電子申請」（電子情報処理組織を使用した申請）により行うことを原則とし、電子申請に対応していない手続を除き、書面申請は電気通信回線の故障等やむを得ない事情がある場合に限り認められる。"
      - section: "II．添付書類等（別表1〜4・最終用途誓約書）"
        title: "規制品目・仕向地の組み合わせごとの提出書類と誓約書の取扱い"
        summary: "輸出令別表第1・外為令別表の各項と仕向地（い地域〜ち地域等）・提供先国の組み合わせに応じ、別表1〜4で必要な提出書類（申請窓口・書類区分コード）を規定。最終用途誓約書の取得要否・記載要領（別記1・別記2）、補修品等で誓約書添付が不要となる場合、及び許可条件として付される再輸出・再販売・再提供に係る事前同意（最終需要者確定時は(a)、未確定時は(b)）について定める。"
      - section: "III．許可後の手続き"
        title: "再輸出等の事前同意手続・誓約書変更手続・旧誓約書の届出手続"
        summary: "許可後に生じる手続として、(1)貨物の再輸出・再販売・再移転又は技術の再提供に係る事前同意手続、(2)大量破壊兵器関連設計・製造技術の提供に伴う事前同意手続、(3)誓約書の変更に関する事前同意手続、(4)旧誓約書を新誓約書に変更したものとみなす場合の届出手続（様式24）を規定。"
      - section: "IV．用語の解釈"
        title: "「最終需要者が確定していない場合」「再販売」「再移転」「再提供」「補修品」等の定義"
        summary: "本通達で用いる主要用語（最終需要者が確定していない場合の意義、提供先国、再販売、再移転、再提供、補修品）の定義を規定。"

