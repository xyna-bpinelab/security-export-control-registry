    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "外為法に基づき、輸出許可・承認の対象となる貨物を指定する政令（別表第1に規制貨物を規定）。"

  - id: jp-foreign-exchange-order
    name: "外国為替令"
    name_en: "Foreign Exchange Order"
    authority: "経済産業省"
    authority_en: "Ministry of Economy, Trade and Industry"
    category: "cabinet_order"
    url: "https://elaws.e-gov.go.jp/document?lawid=355CO0000000260"
    format: "html"
    api_endpoint: "https://elaws.e-gov.go.jp/api/1/lawdata/355CO0000000260"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "外為法に基づき、技術の提供（役務取引）に係る許可手続などを規定する政令（別表に規制技術を規定）。"

  - id: jp-cargo-tech-ministerial-order
