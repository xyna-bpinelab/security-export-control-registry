datasources:
  - id: cn-export-control-law
    name: "中华人民共和国出口管制法"
    name_en: "Export Control Law of the People's Republic of China"
    authority: "中华人民共和国商务部（国家出口管制工作协调机制）"
    authority_en: "Ministry of Commerce of the PRC (National Export Control Work Coordination Mechanism)"
    category: "law"
    url: "https://exportcontrol.mofcom.gov.cn/article/zcfg/gnzcfg/flfg/202111/226.html"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "両用品、軍需品、核関連品目等の輸出管理に関する中国の基本法。2020年12月1日施行。域外適用（第2条）及び対抗措置（第48条）を明記する点が特徴。"
    summary_tree:
      - section: "第2条"
        title: "域外適用"
        summary: "中国域外での行為であっても、国家の安全及び利益を害し、または防拡散義務の履行を妨げる場合には本法を適用できる旨を規定。"
      - section: "第9条"
        title: "管制清单の制定"
        summary: "国家出口管制管理部門が両用品・軍需品・核等の分野ごとに管制物項清单を制定・公表する旨を規定。品目リストの法的根拠となる条文。"
      - section: "第12条"
        title: "許可制度"
        summary: "管制物項の輸出に際し、輸出経営者が国家出口管制管理部門の許可を取得しなければならない旨を規定。"
      - section: "第18条"
        title: "管控名单（輸入者・最終需要者管理リスト）"
        summary: "最終需要者要件への違反やテロ目的への転用のおそれがある輸入者・最終需要者について管控名单を作成し、取引の禁止・制限等の措置を講じることができる旨を規定。"
      - section: "第32条"
        title: "罰則"
        summary: "無許可輸出等の違反行為に対する過料、違法所得の没収、営業許可の取消等の行政処罰及び刑事責任を規定。"
      - section: "第48条"
        title: "対抗措置"
        summary: "外国が本法に違反して輸出管理措置を濫用し、中国の国家安全及び利益を害した場合、中国が相応の対抗措置を講じることができる旨を規定。"

  - id: cn-dual-use-items-regulation
    name: "中华人民共和国两用物项出口管制条例"
    name_en: "Regulations on the Export Control of Dual-Use Items"
    authority: "中华人民共和国商务部"
    authority_en: "Ministry of Commerce of the People's Republic of China"
    category: "cabinet_order"
    url: "https://exportcontrol.mofcom.gov.cn/article/zcfg/gnzcfg/gzjgfxwj/202410/1057.html"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "国務院令第792号（2024年9月30日公布、同年12月1日施行）。従来は核・生物・ミサイル・監視化学品等、分野別に分散していた両用品輸出管理規定を統合した行政法規。出口管制法の下位規定にあたる。"
    summary_tree:
      - section: "第2条"
        title: "両用品の定義"
        summary: "民生用途と軍事用途を併せ持つ、または大量破壊兵器及びその運搬手段の設計・開発・生産・使用に資する貨物・技術・役務を「両用品」と定義。"
      - section: "第3章"
        title: "管制清单及び許可制度"
        summary: "両用物项出口管制清单に掲載された品目の輸出について、一般許可・個別許可等の許可類型及び申請手続を規定。"
      - section: "第4章"
        title: "監督管理"
        summary: "輸出経営者による内部輸出管理体制（内部コンプライアンス制度）の構築奨励、及び税関による通関時の管制物項確認措置を規定。"
      - section: "第5章"
        title: "法的責任"
        summary: "無許可輸出、許可証の不正使用・貸与、管控名单対象者への輸出等の違反行為に対する罰則を規定。"
      - section: "附則"
        title: "旧規定の廃止"
        summary: "本条例の施行に伴い、核輸出管理条例、ミサイル関連品目輸出管理条例、生物両用品輸出管理条例等、既存の分野別両用品輸出管理条例を廃止する旨を規定。"

  - id: cn-dual-use-items-control-list
    name: "中华人民共和国两用物项出口管制清单"
    name_en: "Export Control List of Dual-Use Items of the People's Republic of China"
    authority: "商务部・工业和信息化部・海关总署・国家密码管理局"
    authority_en: "Ministry of Commerce, Ministry of Industry and Information Technology, General Administration of Customs, National Cryptography Administration"
    category: "ministerial_order"
    url: "http://exportcontrol.mofcom.gov.cn/article/zcfg/gnzcfg/zcfggzqd/202411/1067.html"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "商務部・工業和信息化部・海関総署・国家密碼管理局公告2024年第51号（2024年11月発布、同年12月1日実施）。従来分野別に分散していた両用品規制品目を統合したリスト。既存の11本の関連公告を廃止し一本化した。"
    summary_tree:
      - section: "第1部分"
        title: "核両用品及び関連技術"
        summary: "核燃料サイクル関連設備、原子炉部品、ウラン濃縮関連品目等の輸出規制。"
      - section: "第2部分"
        title: "生物両用品及び関連設備・技術"
        summary: "病原体、毒素、発酵槽、噴霧乾燥設備等バイオセーフティ関連品目の輸出規制。"
      - section: "第3部分"
        title: "監視化学品及び関連設備・技術"
        summary: "化学兵器の原料となり得る監視化学品及びその製造設備の輸出規制。"
      - section: "第4部分"
        title: "ミサイル関連品目及び技術"
        summary: "ロケット、無人航空機、誘導装置等ミサイル関連汎用品及び関連技術の輸出規制。"
      - section: "第5部分"
        title: "その他の両用品（先端材料・エレクトロニクス・暗号等）"
        summary: "高性能計算機、半導体製造装置、先端材料、暗号製品・通信機器等、大量破壊兵器の開発や軍事転用に懸念のある汎用品の輸出規制。"

  - id: cn-unreliable-entity-list
    name: "不可靠实体清单规定"
    name_en: "Provisions on the Unreliable Entity List"
    authority: "中华人民共和国商务部（不可靠实体清单工作机制）"
    authority_en: "Ministry of Commerce of the PRC (Unreliable Entity List Working Mechanism)"
    category: "sanction_list"
    url: "http://exportcontrol.mofcom.gov.cn/article/zcfg/gnzcfg/zcfggzqd/202111/446.html"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "商務部令2020年第4号。中国の主権・安全・発展利益を害し、または中国企業との正常な取引を不当に中断する外国実体を「不可靠実体清单」に掲載し、輸出入・投資・入国等を制限する制度。掲載事案は個別公告により随時追加されるため、最新の掲載状況はexportcontrol.mofcom.gov.cn掲載の公告一覧の確認が必要。"
    summary_tree:
      - section: "第2条"
        title: "掲載対象となる行為"
        summary: "市場取引原則への違反、中国企業との正常な取引の不当な中断、差別的措置による中国企業の合法権益への重大な損害等に関与した外国実体を対象とする旨を規定。"
      - section: "第10条"
        title: "講じうる措置"
        summary: "対中輸出入活動の制限・禁止、対中投資の制限・禁止、関係者の入国制限、罰金等の措置を規定。"
      - section: "第11条"
        title: "除外・是正手続"
        summary: "掲載された実体が是正措置を講じた場合等における除外（リストからの削除）手続を規定。"

  - id: cn-export-control-watchlist
    name: "出口管制管控名单"
    name_en: "Export Control Watch List (Controlled List)"
    authority: "中华人民共和国商务部"
    authority_en: "Ministry of Commerce of the People's Republic of China"
    category: "sanction_list"
    url: "https://exportcontrol.mofcom.gov.cn/zcfgList.shtml"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "出口管制法第18条及び両用物项出口管制条例に基づき、最終需要者要件違反やテロ目的転用のおそれがある輸入者・最終需要者を掲載するリスト。米国のEntity Listに相当し、対象実体への両用品輸出は原則禁止される。掲載は商務部公告により個別に随時追加されるため、最新版はexportcontrol.mofcom.gov.cnの公告一覧での確認が必要。"
    summary_tree:
      - section: "掲載基準（出口管制法第18条各号）"
        title: "対象となる輸入者・最終需要者"
        summary: "最終用途・最終需要者要件への違反、国家の安全及び利益への危害、管制物項のテロ目的への転用のおそれ等のいずれかに該当する輸入者・最終需要者を掲載。"
      - section: "措置内容"
        title: "取引禁止・許可拒否等"
        summary: "掲載された実体に対する両用品等管制物項の輸出禁止・制限、既存の輸出活動の中止命令等の措置を規定。"

  - id: cn-attention-list
    name: "关注名单"
    name_en: "Attention List"
    authority: "中华人民共和国商务部"
    authority_en: "Ministry of Commerce of the People's Republic of China"
    category: "sanction_list"
    url: "https://aqygzj.mofcom.gov.cn/flzc/gzjgfxwj/index.html"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "两用物项出口管制条例第26条に基づき、両用品の最終需要者・最終用途を確認できない輸入者・最終需要者を掲載するリスト。管控名单より緩やかな措置（一般許可の利用不可・単項許可申請時のリスク評価報告提出義務等）を課す。2026年に運用開始された新しい制度で、対象実体は核査への協力により掲載解除を申請できる。掲載は商務部公告により個別に随時追加されるため、最新版はaqygzj.mofcom.gov.cnの公告一覧での確認が必要。"
    summary_tree:
      - section: "掲載基準（両用物项出口管制条例第26条）"
        title: "最終需要者・最終用途の確認不能"
        summary: "両用品の最終需要者又は最終用途を確認できない輸入者・最終需要者を対象とする旨を規定。管控名单（重大な違反）より軽度の懸念に対応する予防的措置。"
      - section: "措置内容"
        title: "一般許可利用不可・リスク評価報告義務"
        summary: "対象実体への両用品輸出について、一般許可及び登記填報方式による輸出凭証の取得を不可とし、単項許可申請時にリスク評価報告及び軍事用途に用いない旨の書面確約の提出を義務付ける。"
      - section: "掲載解除"
        title: "核査協力による移出申請"
        summary: "対象実体が核査への協力義務を履行した場合、商務部の確認を経て関注名单から移出（削除）を申請できる旨を規定。"

  - id: cn-arms-export-regulation
    name: "中华人民共和国军品出口管理条例"
    name_en: "Regulations of the People's Republic of China on Administration of Arms Export"
    authority: "国家国防科技工业局・中华人民共和国商务部"
    authority_en: "State Administration of Science, Technology and Industry for National Defense (SASTIND) / Ministry of Commerce"
    category: "cabinet_order"
    url: "https://aqygzj.mofcom.gov.cn/flzc/fg/art/2015/art_a6b0f99dc88b4c53bd3f5278452708ec.html"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "国務院・中央軍事委員会令（2002年改正版）。貿易性を有する軍事目的の装備・専用生産設備・技術・関連役務の対外輸出を規制する行政法規。"
    summary_tree:
      - section: "第2条"
        title: "軍品輸出の定義"
        summary: "貿易性を有する軍事目的の装備、専用生産設備及びその他の物資・技術・関連役務の輸出を「軍品輸出」と定義。"
      - section: "第3条"
        title: "三原則"
        summary: "軍品輸出は、①受入国の正当な自衛能力の向上に資すること、②地域及び世界の平和・安全・安定を損なわないこと、③受入国の内政に干渉しないことの三原則に合致しなければならない旨を規定。"
      - section: "第2章"
        title: "経営許可制度"
        summary: "軍品輸出業務に従事する企業は、国家軍品貿易主管部門の許可（軍品輸出経営許可証）を取得しなければならない旨を規定。"
      - section: "第3章"
        title: "項目・契約の審査認可"
        summary: "個別の軍品輸出プロジェクト及び契約について、国家軍品貿易主管部門による審査認可を要する旨を規定。"
      - section: "第5章"
        title: "罰則"
        summary: "無許可輸出、許可範囲を超えた輸出等の違反行為に対する行政処罰及び刑事責任を規定。"
