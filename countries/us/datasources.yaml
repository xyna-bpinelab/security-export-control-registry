datasources:
  - id: us-export-administration-regulations
    name: "Export Administration Regulations (EAR)"
    authority: "Bureau of Industry and Security, Department of Commerce"
    category: "law"
    url: "https://www.bis.gov/regulations/ear"
    format: "pdf"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "米国発のデュアルユース（軍民両用）の貨物・技術・ソフトウェアの輸出、再輸出、みなし輸出等を規制する規則。域外適用がある点が特徴。"
    summary_tree:
      - section: "Category 0"
        title: "Nuclear Materials, Facilities, and Equipment"
        summary: "核物質、原子炉施設・関連装置、放射線検出機器等、及びその他の産業機器（Miscellaneous Items）を規制。"
      - section: "Category 1"
        title: "Special Materials and Related Equipment, Chemicals, Microorganisms, and Toxins"
        summary: "特殊材料、化学物質、病原性微生物及び毒素（トキシン）関連の貨物・技術を規制。"
      - section: "Category 2"
        title: "Materials Processing"
        summary: "工作機械、振動試験装置、バイオコンテインメント設備等、材料加工関連の汎用機器を規制。"
      - section: "Category 3"
        title: "Electronics"
        summary: "アナログ・デジタル変換回路、高電圧電源、質量分析計等の電子部品・計測機器を規制。"
      - section: "Category 4"
        title: "Computers"
        summary: "デジタルコンピュータ及び関連ソフトウェアを規制。"
      - section: "Category 5 Part 1"
        title: "Telecommunications"
        summary: "水中通信システム、UAV用テレコントロール機器等の通信システム・機器を規制。"
      - section: "Category 5 Part 2"
        title: "Information Security"
        summary: "暗号解読機能を持つ情報セキュリティ機器等、暗号・情報セキュリティ関連の製品・技術を規制。"
      - section: "Category 6"
        title: "Sensors and Lasers"
        summary: "サイドスキャンソナー、磁力計、高出力レーザー等のセンサー・レーザー機器を規制。"
      - section: "Category 7"
        title: "Navigation and Avionics"
        summary: "加速度計、ジャイロ、衛星測位関連機器等の航法・アビオニクス機器を規制。"
      - section: "Category 8"
        title: "Marine"
        summary: "水中カメラ機器等、海洋関連技術を規制。"
      - section: "Category 9"
        title: "Aerospace and Propulsion"
        summary: "船舶用ガスタービンエンジン、樹脂含浸繊維プリプレグ等、航空宇宙・推進関連装置を規制。"

  - id: us-international-traffic-in-arms-regulations
    name: "International Traffic in Arms Regulations (ITAR)"
    authority: "Directorate of Defense Trade Controls, Department of State"
    category: "law"
    url: "https://www.pmddtc.state.gov/ddtc_public?id=ddtc_kb_article_page&sys_id=24d528fddbfc930044f9ff621f961987"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "米国の防衛関連製品、防衛役務、関連技術の輸出及び一時輸入をコントロールする規制。USML（United States Munitions List）を定義する。"
    summary_tree:
      - section: "Category I"
        title: "Firearms, Close Assault Weapons and Combat Shotguns"
        summary: "戦闘用ショットガン、ライフル、リボルバー、サブマシンガン及びその技術データを規制。"
      - section: "Category II"
        title: "Guns and Armament"
        summary: "火炎放射器、目標捕捉・損害評価システム等の銃砲・装備品を規制。"
      - section: "Category III"
        title: "Ammunition/Ordnance"
        summary: "弾薬取扱装置及び関連する技術データ・防衛役務を規制。"
      - section: "Category IV"
        title: "Launch Vehicles, Guided Missiles, Ballistic Missiles, Rockets, Torpedoes, Bombs, and Mines"
        summary: "ロケット、爆弾、魚雷、手榴弾等の発射体・誘導兵器を規制。"
      - section: "Category V"
        title: "Explosives and Energetic Materials, Propellants, Incendiary Agents, and Their Constituents"
        summary: "爆発物、推進薬、焼夷剤及びこれらの構成物質（ジルコニウム、マグネシウム等）を規制。"
      - section: "Category VI"
        title: "Surface Vessels of War and Special Naval Equipment"
        summary: "軍艦及び照射レーザー、ミサイル発射装置等の特殊海軍装備を規制。"
      - section: "Category VII"
        title: "Ground Vehicles"
        summary: "軍用車両及び関連ソフトウェア（重量30トン超の車両用ショックアブソーバー等）を規制。"
      - section: "Category VIII"
        title: "Aircraft and Related Articles"
        summary: "無人航空機（UAV）、攻撃ヘリコプター、標的用ドローン等を規制。"
      - section: "Category IX"
        title: "Military Training Equipment and Training"
        summary: "地上目標訓練装置、ミサイル発射訓練装置等の軍事訓練機器・訓練役務を規制。"
      - section: "Category X"
        title: "Personal Protective Equipment"
        summary: "防弾チョッキ等の個人防護装備及びその部品を規制。"
      - section: "Category XI"
        title: "Military Electronics"
        summary: "水中音響アレイセンサー等、艦艇・潜水艦の探知・追跡に用いる軍事電子機器を規制。"
      - section: "Category XII"
        title: "Fire Control, Laser, Imaging, and Guidance Equipment"
        summary: "国防総省資金による開発用レーザー、イメージングシステム等の射撃管制・誘導機器を規制。"
      - section: "Category XIII"
        title: "Materials and Miscellaneous Articles"
        summary: "軍用・情報機関用暗号システム、透明装甲用セラミック等の材料及びその他の物品を規制。"
      - section: "Category XIV"
        title: "Toxicological Agents, Including Chemical Agents, Biological Agents, and Associated Equipment"
        summary: "化学剤・生物剤等の毒性物質及び関連装置を規制。"
      - section: "Category XV"
        title: "Spacecraft and Related Articles"
        summary: "人工衛星等の宇宙機（民生・軍事用途を問わず、核爆発検知等のために特別設計されたものを含む）を規制。"
      - section: "Category XVI"
        title: "Nuclear Weapons Related Articles"
        summary: "核爆発環境のモデリング・シミュレーションツール等の核兵器関連物品を規制。"
      - section: "Category XVII"
        title: "Classified Articles, Technical Data, and Defense Services Not Otherwise Enumerated"
        summary: "他のカテゴリに明記されていない、機密指定された防衛関連物品・技術データ・防衛役務の受け皿規定。"
      - section: "Category XVIII"
        title: "Directed Energy Weapons"
        summary: "視覚障害・失明を引き起こす指向性エネルギー兵器を規制。"
      - section: "Category XIX"
        title: "Gas Turbine Engines and Associated Equipment"
        summary: "推力15,000lbf以上のターボファン・ターボジェットエンジン等を規制。"
      - section: "Category XX"
        title: "Submersible Vessels and Related Articles"
        summary: "軍事用に特別設計された潜水艦等を規制。"
      - section: "Category XXI"
        title: "Articles, Technical Data, and Defense Services Not Otherwise Enumerated"
        summary: "USMLの他のいずれのカテゴリにも列挙されていないが、国務省が防衛関連物品として指定する物品・技術データ・防衛役務のための受け皿規定。"

  - id: us-consolidated-screening-list
    name: "Consolidated Screening List (CSL)"
    authority: "International Trade Administration, Department of Commerce"
    category: "sanction_list"
    url: "https://www.trade.gov/consolidated-screening-list"
    format: "csv"
    api_endpoint: "https://api.trade.gov/gateway/v1/consolidated_screening_list/search"
    frequency: "daily"
    last_checked: "2026-07-19"
    description: "米国政府（商務省、国務省、財務省）が発行する複数の輸出制限リスト（Entity List、SDN List等）を統合したスクリーニング用リスト。"
    summary_tree:
      - section: "構成リスト1 (商務省)"
        title: "Entity List (EL)"
        summary: "国家安全保障や外交政策に反する活動に関与した外国企業等に対する輸出制限リスト。"
        url: "https://www.bis.gov/entity-list"
      - section: "構成リスト2 (財務省)"
        title: "Specially Designated Nationals (SDN) List"
        summary: "テロリスト、麻薬密売人、および米国制裁対象国の個人や企業などに対する資産凍結・取引禁止リスト。"
        url: "https://ofac.treasury.gov/specially-designated-nationals-list-data-formats-data-schemas"
      - section: "構成リスト3 (国務省)"
        title: "Statutory Debarred List"
        summary: "武器輸出管理法（AECA）違反等により、防衛製品・役務の輸出取引から排除された個人・企業のリスト。"
        url: "https://www.pmddtc.state.gov/ddtc_public?id=ddtc_kb_article_page&sys_id=c22d1833dbb8d300d0a370131f9619f1"

  - id: us-entity-list
    name: "Entity List"
    authority: "Bureau of Industry and Security, Department of Commerce"
    category: "sanction_list"
    url: "https://www.bis.gov/entity-list"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-19"
    description: "米国の国家安全保障や外交政策の利益に反する活動に関与した、または関与する深刻なリスクがある外国の実体（企業、研究機関、個人等）のリスト。"
    summary_tree:
      - section: "掲載基準（15 CFR § 744.11）"
        title: "Reasonable Cause to Believe"
        summary: "国家安全保障又は外交政策上の利益に反する活動（大量破壊兵器の拡散関与、軍事転用懸念等）に関与したと合理的に判断される者を掲載。"
        url: "https://www.bis.gov/licensing/guidance-on-end-user-and-end-use-controls-and-us-person-controls"
      - section: "エントリ構成とライセンス要件"
        title: "License Requirement / License Review Policy"
        summary: "掲載された各主体について、対象品目の範囲（License Requirement）及び許可審査方針（License Review Policy。多くは原則不許可＝Presumption of Denial）が個別に規定される。"
      - section: "Footnote区分"
        title: "Footnoteによる規制類型（Military End User等）"
        summary: "Military End User（footnote 3・5等）等、掲載理由に応じた区分がfootnoteとして付され、EAR対象外国製品への規制範囲（Foreign Direct Product ruleの適用有無等）が異なる。※footnoteごとの詳細な適用条件は15 CFR Part 744の確認が必要。"
        url: "https://www.bis.gov/ear/title-15/subtitle-b/chapter-vii/subchapter-c/part-744/ss-74421-restrictions-certain-military"
