datasources:
  - id: eu-dual-use-regulation
    name: "デュアルユース規則（輸出、仲介、技術支援、通過及び移転の管理に関するEU規則）"
    name_en: "Regulation (EU) 2021/821 setting up an EU regime for the control of exports, brokering, technical assistance, transit and transfer of dual-use items"
    authority: "欧州委員会（貿易・経済安全保障総局）"
    authority_en: "European Commission (Directorate-General for Trade and Economic Security)"
    category: "law"
    url: "https://eur-lex.europa.eu/eli/reg/2021/821/oj/eng"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "通称「デュアルユース規則」。2021年9月9日施行、旧規則(EC) No 428/2009の後継。EU全加盟国に直接適用される規則（国内法化不要）で、軍民両用品（デュアルユース品）の輸出・仲介・技術支援・通過・移転を規律する。附属書I（規制品目リスト）・附属書II（EU一般輸出許可）・附属書IV（域内移転規制品目）等から構成される。品目リストは随時改正されるため、常に最新の統合版（consolidated version）を確認する必要がある。"
    summary_tree:
      - section: "附属書I（Annex I）"
        title: "規制対象デュアルユース品目リスト"
        summary: "ワッセナー・アレンジメント、NSG、MTCR、オーストラリア・グループ等の国際的な輸出管理レジームの合意に基づき、原子力関連資機材、先端材料、材料加工、エレクトロニクス、コンピュータ、通信・情報セキュリティ、センサー・レーザー、航法装置、海洋関連、航空宇宙・推進装置等の品目を規定。"
      - section: "第4条・第5条（キャッチオール規制）"
        title: "リスト非該当品目に対する許可要件"
        summary: "附属書I非該当の品目・仲介サービス・技術支援であっても、化学兵器・生物兵器・核兵器等への転用、武器禁輸対象国での軍事用途、無許可で輸出された軍需品の構成品としての使用が意図される場合には輸出許可を要する。加盟国は、公共の安全（テロ・人権侵害を含む）を理由に、附属書I非該当品目についても許可を要求し、又は禁止することができる。"
      - section: "第5条・第15条（サイバー監視品目）"
        title: "サイバー監視品目の輸出許可（内部弾圧・人権侵害リスク）"
        summary: "国内における弾圧又は国際人道法上の重大な人権侵害に用いられるおそれのあるサイバー監視品目の輸出について許可を要することを規定（2021年改正で新設）。"
      - section: "附属書IV（Annex IV）"
        title: "加盟国間移転についても許可を要する特に機微な品目"
        summary: "ステルス技術、戦略的管理に係る品目等、特に機微性の高いデュアルユース品目を規定。これらの品目は、域外への輸出だけでなく、EU加盟国間の移転についても許可を要する。"
      - section: "附属書II（Annex II、セクションA〜H）"
        title: "EU一般輸出許可（Union General Export Authorisations）"
        summary: "オーストラリア、カナダ、アイスランド、日本、リヒテンシュタイン、ニュージーランド、ノルウェー、スイス、英国、米国等の特定仕向国向けについて、一定の条件の下で個別許可を要さない包括的な許可類型（セクションA〜H）を規定。"
      - section: "許可の類型（5類型）"
        title: "個別許可・グローバル許可・大規模プロジェクト許可等"
        summary: "EU一般輸出許可、加盟国一般輸出許可（Annex II Gの対象国を除く）、個別・グローバル許可（最長2年、輸出者単位で発給）、大規模プロジェクト許可の5類型を規定。いずれもEU関税領域全体で有効。"
      - section: "輸出者の記録保存義務"
        title: "取引記録の5年間保存義務"
        summary: "輸出者は、許可申請に際し最終需要者・仕向国・最終用途に関する完全な情報を提供するとともに、品目の記述・数量、輸出者・荷受人の氏名・住所、最終用途・最終需要者を含む取引記録（送り状等の商業書類を含む）を5年間保存しなければならない。"

  - id: eu-arms-export-common-position
    name: "軍事技術・装備の輸出管理に関する共通規則についての理事会共通見解（2008/944/CFSP）"
    name_en: "Council Common Position 2008/944/CFSP defining common rules governing control of exports of military technology and equipment"
    authority: "欧州連合理事会"
    authority_en: "Council of the European Union"
    category: "law"
    url: "https://eur-lex.europa.eu/eli/compos/2008/944/oj/eng"
    format: "html"
    frequency: "irregular"
    last_checked: "2026-07-20"
    description: "2008年12月8日採択。デュアルユース規則の対象外である軍需品（EU共通軍事品目リスト（EU Common Military List）掲載品目）の輸出許可審査について、全加盟国が最低基準として適用すべき8つの評価基準（第2条）を定める共通外交・安全保障政策（CFSP）上の法的拘束力を有する枠組み。規則とは異なり加盟国の国内法令を通じて実施される。"
    summary_tree:
      - section: "第1条"
        title: "適用範囲（物理的輸出・仲介・通過/積替え・技術の無形移転）"
        summary: "各加盟国は、第12条にいうEU共通軍事品目リスト掲載品目に係る輸出許可申請を、第2条の基準に照らして個別に審査する。対象は物理的な輸出（第三国での実施許諾製造を含む）、仲介許可、通過・積替え許可、電子媒体等によるソフトウェア・技術の無形移転許可の申請を含む。"
      - section: "第2条 基準1"
        title: "加盟国の国際的義務・コミットメントの遵守"
        summary: "国連・EU・OSCEの武器禁輸措置、NPT・生物兵器禁止条約・化学兵器禁止条約上の義務、対人地雷不輸出の誓約、オーストラリア・グループ、MTCR、ザンガー委員会、NSG、ワッセナー・アレンジメント、ハーグ行動規範の枠組み上のコミットメントとの整合性を欠く場合は輸出許可を拒否しなければならない。"
      - section: "第2条 基準2"
        title: "最終仕向国における人権尊重及び国際人道法の遵守"
        summary: "輸出される軍事技術・装備が国内弾圧に用いられる明白なリスクがある場合は許可を拒否する。国連・EU・欧州評議会が重大な人権侵害を認定した国については、当該技術・装備の性質を踏まえ、個別に特段の慎重さと警戒をもって審査する。"
      - section: "第2条 基準3〜4"
        title: "最終仕向国内の情勢及び地域の平和・安定の維持"
        summary: "最終仕向国内における緊張・武力紛争の存否（基準3）、及び地域の平和・安全保障・安定の維持（基準4）を審査要素として規定。"
      - section: "第2条 基準5〜6"
        title: "加盟国の国家安全保障及び購入国の国際社会に対する行動"
        summary: "加盟国・友好国・同盟国の国家安全保障（基準5）、購入国のテロに対する姿勢・同盟関係の性質・国際法の遵守等、国際社会に対する行動（基準6）を審査要素として規定。"
      - section: "第2条 基準7〜8"
        title: "横流し・再輸出リスク及び受領国の経済的能力との整合性"
        summary: "購入国内での横流し又は好ましくない条件での再輸出のリスクの存否（基準7）、及び受領国の軍事支出と社会的支出のバランス等、当該輸出と受領国の技術的・経済的能力との整合性（基準8）を審査要素として規定。"

  - id: eu-financial-sanctions-list
    name: "EU金融制裁対象者統合リスト"
    name_en: "EU Consolidated List of Persons, Groups and Entities Subject to EU Financial Sanctions"
    authority: "欧州委員会"
    authority_en: "European Commission"
    category: "sanction_list"
    url: "https://webgate.ec.europa.eu/fsd/fsf/public/home"
    format: "other"
    frequency: "daily"
    last_checked: "2026-07-20"
    description: "国連安全保障理事会決議及びEU独自の制裁（CFSP理事会決定・理事会規則）に基づき資産凍結等の対象となる個人・団体・事業体を集約した統合リスト。Financial Sanctions Files（FSF）データベースとしてPDF・CSV・XML形式で公開され、原則として毎日更新される。EU官報（Official Journal）掲載から反映までに数週間程度のタイムラグが生じる場合がある点に留意が必要。"
    summary_tree:
      - section: "対象根拠"
        title: "国連制裁の実施及びEU独自制裁（CFSP）"
        summary: "国連安全保障理事会決議に基づく資産凍結措置を実施する理事会規則、及びEUが独自に採択するCFSP理事会決定・理事会規則（対ロシア、対イラン、対北朝鮮、テロ対策等、案件ごとの制裁レジーム）に基づき指定された対象者を集約する。"
      - section: "規制内容"
        title: "資産凍結及び資金・経済的資源の提供禁止"
        summary: "掲載された個人・団体の資産凍結、並びにこれらの者に対する資金又は経済的資源の直接・間接の提供の禁止を内容とする。EU域内の全ての自然人・法人及びEU域内で事業を行う事業体に適用される。"