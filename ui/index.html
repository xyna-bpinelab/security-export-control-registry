<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全保障輸出管理リーガル・マップ・ツール</title>
  <meta name="description" content="国内外の安全保障輸出管理に関する法規・リストのサマリーを閲覧し、原典へアクセスするためのポータルサイト">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="/src/index.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="container">
        <div class="logo-area">
          <span class="logo-icon">🛡️</span>
          <h1>Security Export Control <span class="text-gradient">Legal Map</span></h1>
        </div>
        <p class="subtitle">安全保障輸出管理の法規・規制リストサマリー & 原典ナビゲーター</p>
      </div>
    </header>

    <main class="container">
      <!-- Mode Switcher -->
      <section class="mode-switcher">
        <button class="mode-btn active" data-mode="laws" id="mode-laws">📜 法令・規制リスト</button>
        <button class="mode-btn" data-mode="entities" id="mode-entities">🗂️ 規制対象エンティティ検索</button>
      </section>

      <!-- Laws & Regulations View -->
      <div id="laws-view">
        <!-- Search & Filter Controls -->
        <section class="controls-card">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="法規名、規制区分、サマリー内容を検索..." autocomplete="off">
          </div>

          <div class="tab-filters">
            <button class="tab-btn active" data-country="jp" id="tab-jp">🇯🇵 日本 (Japan)</button>
            <button class="tab-btn" data-country="us" id="tab-us">🇺🇸 米国 (United States)</button>
            <button class="tab-btn" data-country="cn" id="tab-cn">🇨🇳 中国 (China)</button>
            <button class="tab-btn" data-country="ml" id="tab-ml">🌐 国際レジーム (Multilateral Regimes)</button>
          </div>
        </section>

        <!-- Registry Content Area -->
        <section id="registry-container" class="registry-grid">
          <div class="loading-spinner">データを読み込んでいます...</div>
        </section>
      </div>

      <!-- Entity Search View -->
      <div id="entities-view" class="hidden">
        <section class="controls-card">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="entity-search-input" placeholder="企業名・団体名・エイリアスで検索（2文字以上）..." autocomplete="off">
          </div>

          <div class="view-toggle" id="entity-view-toggle" role="group" aria-label="表示形式">
            <button class="view-toggle-btn" data-view="card" id="entity-view-card" type="button">🗂️ カード表示</button>
            <button class="view-toggle-btn active" data-view="list" id="entity-view-list" type="button">📋 リスト表示</button>
          </div>
        </section>

        <section class="controls-card country-filter-card">
          <div class="country-filters" id="entity-country-filters">
            <label class="country-checkbox country-checkbox-all">
              <input type="checkbox" id="entity-country-all" checked>
              <span>すべて</span>
            </label>
            <label class="country-checkbox">
              <input type="checkbox" class="entity-country-checkbox" data-country="us" checked>
              <span>🇺🇸 米国 (CSL)</span>
            </label>
            <label class="country-checkbox">
              <input type="checkbox" class="entity-country-checkbox" data-country="jp" checked>
              <span>🇯🇵 日本（外国ユーザーリスト）</span>
            </label>
            <label class="country-checkbox">
              <input type="checkbox" class="entity-country-checkbox" data-country="cn" checked>
              <span>🇨🇳 中国（不可靠実体清単等）</span>
            </label>
          </div>
        </section>

        <section class="entity-summary-section">
          <button class="entity-summary-toggle open" id="entity-summary-toggle" type="button" aria-expanded="true" aria-controls="entity-summary-panels">
            <span>📊 収録状況・推移</span>
            <span class="accordion-arrow">▶</span>
          </button>
          <div id="entity-summary-panels" class="entity-summary-panels"></div>
        </section>

        <section id="entity-results" class="entity-results">
          <div class="loading-spinner">検索語を入力してください（2文字以上）</div>
        </section>
      </div>

      <!-- Entity Detail Modal -->
      <div id="entity-modal-overlay" class="modal-overlay hidden">
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="entity-modal-title">
          <button class="modal-close" id="entity-modal-close" type="button" aria-label="閉じる">✕</button>
          <div id="entity-modal-content"></div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="container">
        <p>&copy; 2026 Security Export Control Registry Project. Open Source under the MIT License.</p>
        <p class="footer-links">
          <a href="https://github.com/xyna-bpinelab/security-export-control-registry" target="_blank" rel="noopener">GitHub Repository</a>
        </p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
